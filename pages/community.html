<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌐 Comunidad Dev — Academia hachimaki</title>
  <meta name="description" content="Feed global de la comunidad de desarrolladores." />
  <script src="../js/theme-engine.js"></script>
  <link rel="stylesheet" href="../css/themes.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="../js/theme-selector.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="../css/social-dashboard.css" />
</head>

<body class="min-h-screen relative overflow-x-hidden">
  <div class="bg-shape" style="width:300px;height:300px;background:var(--t-shape-1);top:10%;left:-5%;"></div>
  <div class="bg-shape" style="width:200px;height:200px;background:var(--t-shape-2);top:60%;right:-3%;"></div>

  <!-- Top Nav Bar -->
  <nav class="top-nav"
    style="position:fixed;top:0;left:0;right:0;height:4rem;background:var(--t-glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--t-glass-border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;z-index:1000;box-shadow:0 4px 20px var(--t-shadow);">
    <div class="nav-brand"
      style="font-size:1.25rem;font-weight:800;color:var(--t-accent);display:flex;align-items:center;gap:0.5rem;">💻
      <span class="hidden-mobile">Academia hachimaki</span></div>
    <div id="auth-nav" style="display:flex;align-items:center;gap:0.5rem;">
      <a href="../index.html" class="nav-auth-btn" style="padding:0.4rem 1rem;background:transparent;border:none;">🏠
        Home</a>
      <a href="dashboard.html" class="nav-auth-btn" style="padding:0.4rem 1rem;">Dashboard</a>
    </div>
  </nav>

  <div id="app" class="relative z-10" style="max-width:800px;margin:0 auto;padding:6rem 1rem 4rem;">

    <!-- Loading -->
    <div id="loading-screen" v-if="loading">
      <div class="auth-card">
        <div class="spinner"></div>
        <p class="auth-subtitle">Cargando la comunidad...</p>
      </div>
    </div>

    <template v-else>
      <!-- Header -->
      <div class="sd-card fade-in-up" style="margin-bottom: 1.5rem;">
        <h1 class="text-xl font-bold" style="color: var(--t-accent); display: flex; align-items: center; gap: 0.5rem;">
          🌐 Dev Feed
        </h1>
        <p class="text-sm" style="color:var(--t-text-secondary); margin-top: 0.5rem;">Aquí puedes ver los Dev Blogs
          públicos de tus compañeros. Lee, aprende y comenta constructivamente.</p>
      </div>

      <!-- Feed List -->
      <div v-if="publicEntries.length" class="flex flex-col gap-4">
        <div v-for="(entry, idx) in publicEntries" :key="entry.id" class="sd-card fade-in-up"
          :style="{ animationDelay: (idx * 0.05) + 's' }">

          <!-- Post Header -->
          <div class="sd-post-header">
            <div class="sd-post-meta">
              <img :src="getAvatar(entry.profiles?.avatar_id)" class="sd-av" />
              <div>
                <div class="sd-post-author">
                  {{ entry.profiles?.nickname || 'Usuario Desconocido' }}
                  <span v-if="entry.profiles?.level" class="sd-pill"
                    style="background:var(--t-surface-alt);border:1px solid var(--t-glass-border);color:var(--t-text-secondary);font-size:0.7rem;">Lvl
                    {{ entry.profiles.level }}</span>
                </div>
                <div class="sd-post-time">
                  Sección {{ entry.profiles?.section || 'N/A' }} • {{ formatDate(entry.created_at) }}
                </div>
              </div>
            </div>
            <!-- Botón de Compartir -->
            <div style="position:relative;">
              <button class="sd-btn-sm"
                style="padding:0.4rem;font-size:0.8rem;width:auto;background:transparent;border:none;"
                @click="toggleShareMenu(entry.id)">
                🔗
              </button>
              <div v-if="activeShareMenu === entry.id" class="sd-card"
                style="position:absolute;right:0;top:100%;z-index:100;min-width:180px;display:flex;flex-direction:column;gap:5px;padding:0.5rem;">
                <button class="option-btn" style="padding:0.4rem 0.8rem;font-size:0.8rem;border:none;"
                  @click="shareTo('twitter', entry)">🐦 Twitter / X</button>
                <button class="option-btn" style="padding:0.4rem 0.8rem;font-size:0.8rem;border:none;"
                  @click="shareTo('linkedin', entry)">💼 LinkedIn</button>
                <button class="option-btn" style="padding:0.4rem 0.8rem;font-size:0.8rem;border:none;"
                  @click="shareTo('instagram', entry)">📸 Instagram</button>
                <button class="option-btn" style="padding:0.4rem 0.8rem;font-size:0.8rem;border:none;"
                  @click="shareTo('tiktok', entry)">🎵 TikTok</button>
              </div>
            </div>
          </div>

          <!-- Post Content -->
          <h2 class="text-lg font-bold mb-2" style="color:var(--t-accent);">{{ entry.title }}</h2>
          <div v-if="entry.tags && entry.tags.length" style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
            <span v-for="tag in entry.tags" :key="tag" class="sd-tag"
              style="background:var(--t-accent-subtle);color:var(--t-accent);">{{ tag }}</span>
          </div>
          <div class="sd-post-body" v-html="renderMd(entry.content)"></div>

          <!-- Comments Section -->
          <hr class="sd-divider">
          <div class="mt-2">
            <div class="sd-sec" style="margin-bottom:0.5rem;font-size:0.8rem;">
              Comentarios ({{ getCommentsForEntry(entry.id).length }})
            </div>

            <div v-if="getCommentsForEntry(entry.id).length > 0" class="flex flex-col gap-2 mb-3">
              <div v-for="comment in getCommentsForEntry(entry.id)" :key="comment.id" class="flex gap-2 text-sm"
                style="padding:0.5rem; background:var(--t-surface-alt); border-radius:var(--t-radius, 12px);">
                <img :src="getAvatar(comment.profiles?.avatar_id)" class="sd-av" style="width:24px;height:24px;" />
                <div class="flex-1">
                  <div class="flex justify-between items-baseline mb-1">
                    <span class="font-bold text-xs" style="color:var(--t-text);">{{ comment.profiles?.nickname }}</span>
                    <span class="text-xs" style="color:var(--t-text-muted);">{{ formatDate(comment.created_at) }}</span>
                  </div>
                  <p style="color:var(--t-text-secondary); word-break: break-word; margin:0; font-size:0.8rem;">{{
                    comment.content }}</p>
                </div>
              </div>
            </div>
            <div v-else class="text-xs mb-3" style="color:var(--t-text-muted);">Sé el primero en comentar...</div>

            <!-- Add Comment -->
            <div class="flex gap-2">
              <input type="text" class="form-input text-sm m-0" placeholder="Escribe un comentario..."
                v-model="newComments[entry.id]" @keyup.enter="postComment(entry.id)" />
              <button class="sd-btn-accent" style="padding:0.4rem 1rem; width:auto;"
                :disabled="postingComment === entry.id" @click="postComment(entry.id)">
                <span v-if="postingComment === entry.id" class="spinner" style="width:14px;height:14px;"></span>
                <span v-else>Enviar</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div v-else class="sd-card fade-in-up">
        <div class="sd-empty">
          <div class="sd-empty-icon">🌐</div>
          <div class="sd-empty-text">
            Aún no hay publicaciones en el feed global.<br>
            <span style="font-size:0.8rem;color:var(--t-text-muted);">Ve a tu Diario y marca una entrada como Pública
              para aparecer aquí.</span>
          </div>
        </div>
      </div>
    </template>
  </div>

  <script src="../js/supabase-client.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          loading: true,
          profile: null,
          publicEntries: [],
          comments: [],
          newComments: {},
          postingComment: null,
          activeShareMenu: null,
          avatarCatalog: SupabaseManager.getAvatarCatalog()
        };
      },
      async mounted() {
        const profile = await SupabaseManager.requireProfile('setup-profile.html');
        if (!profile) return;
        this.profile = profile;
        await this.loadFeed();
        this.loading = false;
      },
      methods: {
        async loadFeed() {
          const client = SupabaseManager.getClient();

          // Load public entries with user profile
          const { data: entries, error } = await client
            .from('diary_entries')
            .select('*, profiles(nickname, avatar_id, level, section)')
            .eq('is_public', true)
            .order('created_at', { ascending: false });

          if (!error && entries) {
            this.publicEntries = entries;

            // Load comments for these entries
            const entryIds = entries.map(e => e.id);
            if (entryIds.length > 0) {
              const { data: commentsData } = await client
                .from('diary_comments')
                .select('*, profiles(nickname, avatar_id)')
                .in('entry_id', entryIds)
                .order('created_at', { ascending: true });

              this.comments = commentsData || [];
            }
          }
        },
        getCommentsForEntry(entryId) {
          return this.comments.filter(c => c.entry_id === entryId);
        },
        formatDate(dateStr) {
          const d = new Date(dateStr);
          const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
          return `${d.getDate()} ${months[d.getMonth()]}, ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        },
        renderMd(text) {
          if (typeof marked !== 'undefined') return marked.parse(text || '');
          return (text || '').replace(/\n/g, '<br>');
        },
        getAvatar(id) {
          const av = this.avatarCatalog.find(a => a.id === id);
          return av ? av.src : this.avatarCatalog[0].src;
        },
        async postComment(entryId) {
          const content = (this.newComments[entryId] || '').trim();
          if (!content) return;

          this.postingComment = entryId;
          const client = SupabaseManager.getClient();

          const { data, error } = await client
            .from('diary_comments')
            .insert({
              entry_id: entryId,
              user_id: this.profile.id,
              content: content
            })
            .select('*, profiles(nickname, avatar_id)')
            .single();

          if (error) {
            SupabaseManager.showToast('Error publicando: ' + error.message, 'error');
          } else {
            this.comments.push(data);
            this.newComments[entryId] = '';
            SupabaseManager.showToast('Comentario publicado', 'success');
          }
          this.postingComment = null;
        },
        toggleShareMenu(entryId) {
          this.activeShareMenu = this.activeShareMenu === entryId ? null : entryId;
        },
        shareTo(network, entry) {
          const url = window.location.href; // O una URL directa si tuvieras rutas dinámicas
          const text = encodeURIComponent(`Acabo de publicar "${entry.title}" en mi Dev Blog de Academia hachimaki. ¡Léelo aquí! 🚀💻`);

          if (network === 'twitter') {
            window.open(`https://twitter.com/intent/tweet?text=${text}&url=${encodeURIComponent(url)}`, '_blank');
          } else if (network === 'linkedin') {
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`, '_blank');
          } else if (network === 'instagram' || network === 'tiktok') {
            // Instagram/TikTok don't have direct web intents for sharing text links easily
            navigator.clipboard.writeText(`Acabo de publicar "${entry.title}" en mi Dev Blog! Léelo en: ${url}`);
            SupabaseManager.showToast(`¡Enlace copiado! Pégalo en tu bio/historia de ${network === 'instagram' ? 'Instagram' : 'TikTok'} 📱`, 'success', 5000);
          }
          this.activeShareMenu = null;
        }
      },
    }).mount('#app');
  </script>
</body>

</html>
