<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📖 Mi Diario de Clase — Academia hachimaki</title>
  <meta name="description" content="Diario personal de clase para registrar aprendizajes diarios." />
  <script src="../js/theme-engine.js"></script>
  <link rel="stylesheet" href="../css/themes.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <!-- EasyMDE Markdown Editor -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="../css/social-dashboard.css" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="../js/theme-selector.js" defer></script>
  <!-- Marked for MD rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="min-h-screen relative overflow-x-hidden">
  <div class="bg-shape" style="width:300px;height:300px;background:var(--t-shape-1);top:10%;left:-5%;"></div>
  <div class="bg-shape" style="width:200px;height:200px;background:var(--t-shape-2);top:60%;right:-3%;"></div>

  <!-- Top Nav Bar -->
  <nav class="top-nav"
    style="position:fixed;top:0;left:0;right:0;height:4rem;background:var(--t-glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--t-glass-border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;z-index:1000;box-shadow:0 4px 20px var(--t-shadow);">
    <div class="nav-brand"
      style="font-size:1.25rem;font-weight:800;color:var(--t-accent);display:flex;align-items:center;gap:0.5rem;">💻
      <span class="hidden-mobile">Academia hachimaki</span></div>
    <div id="auth-nav" style="display:flex;align-items:center;gap:0.5rem;">
      <a href="../index.html" class="nav-auth-btn" style="padding:0.4rem 1rem;background:transparent;border:none;">🏠
        Home</a>
      <a href="dashboard.html" class="nav-auth-btn" style="padding:0.4rem 1rem;">Dashboard</a>
    </div>
  </nav>

  <div id="app" class="relative z-10" style="max-width:800px;margin:0 auto;padding:6rem 1rem 4rem;">

    <!-- Loading -->
    <div id="loading-screen" v-if="loading">
      <div class="auth-card">
        <div class="spinner"></div>
        <p class="auth-subtitle">Cargando tu diario...</p>
      </div>
    </div>

    <template v-else>
      <!-- Header / Search -->
      <div class="sd-card fade-in-up" style="margin-bottom: 1.5rem;">
        <h1 class="text-xl font-bold"
          style="color: var(--t-accent); display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
          📖 Mi Diario
        </h1>
        <div class="search-input-wrap" style="margin-bottom:1rem; max-width:100%;">
          <span class="icon">🔍</span>
          <input type="text" class="search-input" placeholder="Buscar en tu diario..." v-model="searchQuery"
            id="diary-search-input" />
        </div>
        <!-- Tag filters -->
        <div class="tag-filters">
          <button class="tag-pill" :class="{ active: activeTag === '' }" @click="activeTag = ''">✨ Todas</button>
          <button v-for="tag in availableTags" :key="tag" class="tag-pill" :class="{ active: activeTag === tag }"
            @click="activeTag = tag">
            {{ tagEmoji(tag) }} {{ tag }}
          </button>
        </div>
      </div>

      <!-- Entries list -->
      <div v-if="filteredEntries.length" style="display:flex;flex-direction:column;gap:1rem;">
        <div v-for="(entry, idx) in filteredEntries" :key="entry.id" class="sd-card fade-in-up" style="cursor:pointer;"
          :style="{ animationDelay: (idx * 0.05) + 's' }" @click="viewEntry(entry)">

          <div class="sd-post-header">
            <div class="sd-post-meta">
              <div class="sd-post-author">
                <span class="entry-emoji" style="margin-right:0.3rem;">📝</span>
                {{ entry.title }}
              </div>
              <div class="sd-post-time">{{ formatDate(entry.created_at) }}</div>
            </div>
            <span v-if="entry.is_public" class="sd-pill"
              style="background:var(--t-correct-bg);color:var(--t-correct-text);">🌐 Público</span>
          </div>

          <div class="sd-post-body"
            style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t-text-secondary);">
            {{ stripMd(entry.content) }}
          </div>

          <div v-if="entry.tags && entry.tags.length">
            <span v-for="tag in entry.tags" :key="tag" class="sd-tag"
              style="background:var(--t-accent-subtle);color:var(--t-accent);">{{ tag }}</span>
          </div>

          <hr class="sd-divider">

          <!-- Actions -->
          <div class="sd-post-actions" @click.stop>
            <button class="sd-action" @click="editEntry(entry)">✏️ Editar</button>
            <button class="sd-action" style="color:var(--t-wrong-text);" @click="confirmDelete(entry)">🗑️
              Eliminar</button>
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div v-else class="sd-card fade-in-up">
        <div class="sd-empty">
          <div class="sd-empty-icon">📖</div>
          <div class="sd-empty-text">
            <span v-if="searchQuery || activeTag">No se encontraron entradas con ese filtro.</span>
            <span v-else>¡Tu diario está vacío! Crea tu primera entrada.</span>
          </div>
        </div>
      </div>

      <!-- FAB -->
      <button class="diary-fab" @click="openEditor()" title="Nueva entrada" aria-label="Crear nueva entrada">+</button>

      <!-- Editor Modal -->
      <div v-if="showEditor" class="diary-modal-overlay" @click.self="cancelEditor">
        <div class="diary-modal">
          <div class="diary-modal-header">
            <h2 class="text-lg font-bold" style="color:var(--t-accent);">
              {{ editingEntry ? '✏️ Editar Entrada' : '✨ Nueva Entrada' }}
            </h2>
            <button class="diary-modal-close" @click="cancelEditor">✕</button>
          </div>

          <div class="form-group">
            <label class="form-label" for="entry-title">Título</label>
            <input id="entry-title" type="text" class="form-input" v-model="editorTitle"
              placeholder="¿Qué aprendiste hoy? 🌟" maxlength="100" />
          </div>

          <div class="form-group">
            <label class="form-label">Contenido (Markdown)</label>
            <textarea id="md-editor" style="display:none;"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Tags</label>
            <div class="flex gap-2 flex-wrap mb-3">
              <button v-for="tag in defaultTags" :key="tag" class="tag-pill"
                :class="{ active: editorTags.includes(tag) }" @click="toggleTag(tag)" type="button"
                style="font-size:0.78rem;">
                {{ tagEmoji(tag) }} {{ tag }}
              </button>
            </div>

            <label class="form-label"
              style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:15px;padding:10px;background:rgba(16,185,129,0.1);border-radius:8px;border:1px solid rgba(16,185,129,0.2);">
              <input type="checkbox" v-model="editorIsPublic" style="width:18px;height:18px;accent-color:#10b981;" />
              <div>
                <span style="color:#10b981;font-weight:bold;">Hacer Público (Dev Blog)</span>
                <div style="font-size:0.75rem;color:var(--t-text-muted);font-weight:normal;">Otros desarrolladores
                  podrán leerlo y comentarlo en el Feed Global.</div>
              </div>
            </label>
          </div>

          <div class="flex gap-3">
            <button class="sd-btn-sm" style="flex:1;padding:0.6rem;" @click="cancelEditor">Cancelar</button>
            <button class="sd-btn-accent" :disabled="saving" @click="saveEntry" style="flex:2;padding:0.6rem;">
              <span v-if="saving" class="spinner"></span>
              <span v-else>{{ editingEntry ? 'Guardar' : 'Crear' }} 💾</span>
            </button>
          </div>
        </div>
      </div>

      <!-- View Modal -->
      <div v-if="viewingEntry" class="diary-modal-overlay" @click.self="viewingEntry = null">
        <div class="diary-modal">
          <div class="diary-modal-header">
            <h2 class="text-lg font-bold" style="color:var(--t-accent);">{{ viewingEntry.title }}</h2>
            <button class="diary-modal-close" @click="viewingEntry = null">✕</button>
          </div>
          <p class="text-xs mb-3" style="color:var(--t-text-muted);">{{ formatDate(viewingEntry.created_at) }}</p>
          <div v-if="viewingEntry.tags && viewingEntry.tags.length" class="flex gap-2 flex-wrap mb-3">
            <span v-for="tag in viewingEntry.tags" :key="tag" class="entry-tag python">{{ tag }}</span>
          </div>
          <div class="doc-section" v-html="renderMd(viewingEntry.content)"></div>
        </div>
      </div>

      <!-- Delete confirmation -->
      <div v-if="deletingEntry" class="diary-modal-overlay" @click.self="deletingEntry = null">
        <div class="diary-modal" style="max-width:400px;text-align:center;">
          <div style="font-size:3rem;margin-bottom:1rem;">🗑️</div>
          <p class="font-bold mb-2" style="color:var(--t-text);">¿Eliminar esta entrada?</p>
          <p class="text-sm mb-4" style="color:var(--t-text-muted);">{{ deletingEntry.title }}</p>
          <div class="flex gap-3">
            <button class="sd-btn-sm" @click="deletingEntry = null" style="flex:1;padding:0.6rem;">Cancelar</button>
            <button class="sd-btn-accent" @click="deleteEntry"
              style="flex:1;padding:0.6rem;background:var(--t-wrong);border-color:var(--t-wrong);">Eliminar</button>
          </div>
        </div>
      </div>
    </template>
  </div>

  <script src="../js/supabase-client.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          loading: true,
          profile: null,
          entries: [],
          searchQuery: '',
          activeTag: '',
          showEditor: false,
          editorTitle: '',
          editorTags: [],
          editorIsPublic: false,
          editingEntry: null,
          viewingEntry: null,
          deletingEntry: null,
          saving: false,
          mdeInstance: null,
          defaultTags: ['Python', 'Git', 'Proyecto', 'Clase', 'Bug', 'Logro', 'Recurso'],
        };
      },
      computed: {
        availableTags() {
          const tags = new Set();
          this.entries.forEach(e => (e.tags || []).forEach(t => tags.add(t)));
          return Array.from(tags).sort();
        },
        filteredEntries() {
          let results = this.entries;
          if (this.activeTag) {
            results = results.filter(e => (e.tags || []).includes(this.activeTag));
          }
          if (this.searchQuery.trim()) {
            const q = this.searchQuery.toLowerCase();
            results = results.filter(e =>
              e.title.toLowerCase().includes(q) ||
              e.content.toLowerCase().includes(q) ||
              (e.tags || []).some(t => t.toLowerCase().includes(q))
            );
          }
          return results.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        },
      },
      async mounted() {
        const profile = await SupabaseManager.requireProfile('setup-profile.html');
        if (!profile) return;
        this.profile = profile;
        await this.loadEntries();
        this.loading = false;
      },
      methods: {
        async loadEntries() {
          const client = SupabaseManager.getClient();
          const { data, error } = await client
            .from('diary_entries')
            .select('*')
            .eq('user_id', this.profile.id)
            .order('created_at', { ascending: false });
          if (!error && data) this.entries = data;
        },
        formatDate(dateStr) {
          const d = new Date(dateStr);
          const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
          return `${d.getDate()} ${months[d.getMonth()]}, ${d.getFullYear()} — ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        },
        tagEmoji(tag) {
          const map = { Python: '🐍', Git: '🐙', Proyecto: '💻', Clase: '📚', Bug: '🐛', Logro: '🏆', Recurso: '🔗' };
          return map[tag] || '🏷️';
        },
        stripMd(text) {
          return (text || '').replace(/[#*_`\[\]()>~-]/g, '').substring(0, 120);
        },
        renderMd(text) {
          if (typeof marked !== 'undefined') return marked.parse(text || '');
          return (text || '').replace(/\n/g, '<br>');
        },
        toggleTag(tag) {
          const idx = this.editorTags.indexOf(tag);
          if (idx >= 0) this.editorTags.splice(idx, 1);
          else this.editorTags.push(tag);
        },
        viewEntry(entry) {
          this.viewingEntry = entry;
        },
        openEditor(entry = null) {
          this.editingEntry = entry;
          this.editorTitle = entry ? entry.title : '';
          this.editorTags = entry ? [...(entry.tags || [])] : [];
          this.editorIsPublic = entry ? !!entry.is_public : false;
          this.showEditor = true;
          this.$nextTick(() => {
            const el = document.getElementById('md-editor');
            if (el && !this.mdeInstance) {
              this.mdeInstance = new EasyMDE({
                element: el,
                placeholder: '¿Qué aprendiste hoy? Puedes usar **Markdown**, enlaces, y bloques de código...',
                spellChecker: false,
                status: false,
                minHeight: '200px',
                toolbar: ['bold', 'italic', 'heading', '|', 'code', 'quote', '|', 'unordered-list', 'ordered-list', '|', 'link', 'image', '|', 'preview', 'guide'],
                initialValue: entry ? entry.content : '',
              });
            } else if (this.mdeInstance) {
              this.mdeInstance.value(entry ? entry.content : '');
            }
          });
        },
        cancelEditor() {
          this.showEditor = false;
          if (this.mdeInstance) {
            this.mdeInstance.toTextArea();
            this.mdeInstance = null;
          }
        },
        editEntry(entry) {
          this.openEditor(entry);
        },
        confirmDelete(entry) {
          this.deletingEntry = entry;
        },
        async deleteEntry() {
          const client = SupabaseManager.getClient();
          const { error } = await client.from('diary_entries').delete().eq('id', this.deletingEntry.id);
          if (error) {
            SupabaseManager.showToast('Error al eliminar', 'error');
          } else {
            this.entries = this.entries.filter(e => e.id !== this.deletingEntry.id);
            SupabaseManager.showToast('Entrada eliminada', 'info');
          }
          this.deletingEntry = null;
        },
        async saveEntry() {
          if (!this.editorTitle.trim()) {
            SupabaseManager.showToast('El título es obligatorio', 'warning');
            return;
          }
          const content = this.mdeInstance ? this.mdeInstance.value() : '';
          if (!content.trim()) {
            SupabaseManager.showToast('Escribe algo en el contenido', 'warning');
            return;
          }

          this.saving = true;
          const client = SupabaseManager.getClient();

          if (this.editingEntry) {
            // Update
            const { error } = await client.from('diary_entries')
              .update({ title: this.editorTitle.trim(), content, tags: this.editorTags, is_public: this.editorIsPublic, updated_at: new Date().toISOString() })
              .eq('id', this.editingEntry.id);
            if (error) { SupabaseManager.showToast('Error: ' + error.message, 'error'); }
            else { SupabaseManager.showToast('Entrada actualizada ✅', 'success'); }
          } else {
            // Insert
            const { error } = await client.from('diary_entries')
              .insert({ user_id: this.profile.id, title: this.editorTitle.trim(), content, tags: this.editorTags, is_public: this.editorIsPublic });
            if (error) { SupabaseManager.showToast('Error: ' + error.message, 'error'); }
            else { SupabaseManager.showToast('Entrada creada ✨', 'success'); }
          }

          this.saving = false;
          this.cancelEditor();
          await this.loadEntries();
        },
      },
    }).mount('#app');
  </script>
</body>

</html>
