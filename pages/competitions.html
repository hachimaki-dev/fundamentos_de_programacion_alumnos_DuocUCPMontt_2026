<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏆 Competencias — Academia hachimaki</title>
  <meta name="description" content="Competencias de código estilo Codewars." />
  <script src="../js/theme-engine.js"></script>
  <link rel="stylesheet" href="../css/themes.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="../js/theme-selector.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="../css/social-dashboard.css" />
  <style>
    .dojo-commit-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: var(--t-surface-alt);
      border-radius: 0.75rem;
      margin-bottom: 4px;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }
    .dojo-commit-row:hover {
      background: var(--t-surface-hover);
      border-color: var(--t-glass-border);
    }
    .dojo-commit-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
      background: var(--t-surface);
      border: 1px solid var(--t-glass-border);
    }
    .dojo-commit-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .dojo-commit-nick {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--t-text);
      cursor: pointer;
    }
    .dojo-github-link {
      color: var(--t-text-muted);
      transition: color 0.2s;
      display: flex;
      align-items: center;
      opacity: 0.7;
    }
    .dojo-github-link:hover {
      color: var(--t-accent);
      opacity: 1;
    }
    .dojo-level-badge {
      font-size: 0.65rem;
      background: var(--t-accent-subtle);
      color: var(--t-accent);
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .dojo-commit-spacer {
      flex: 1;
    }
    .dojo-file-pill {
      font-size: 0.7rem;
      padding: 4px 10px;
      background: var(--t-surface);
      border: 1px solid var(--t-glass-border);
      border-radius: 20px;
      color: var(--t-text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Fira Code', monospace;
    }
    .dojo-file-pill:hover {
      border-color: var(--t-accent);
      color: var(--t-accent);
      background: var(--t-accent-subtle);
    }
    .dojo-commit-time {
      font-size: 0.7rem;
      color: var(--t-text-muted);
      min-width: 80px;
      text-align: right;
      font-weight: 500;
    }
  </style>
</head>

<body class="min-h-screen relative overflow-x-hidden">
  <div class="bg-shape" style="width:300px;height:300px;background:var(--t-shape-1);top:10%;left:-5%;"></div>
  <div class="bg-shape" style="width:200px;height:200px;background:var(--t-shape-2);top:60%;right:-3%;"></div>

  <!-- Top Nav Bar -->
  <nav class="top-nav"
    style="position:fixed;top:0;left:0;right:0;height:4rem;background:var(--t-glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--t-glass-border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;z-index:1000;box-shadow:0 4px 20px var(--t-shadow);">
    <div class="nav-brand"
      style="font-size:1.25rem;font-weight:800;color:var(--t-accent);display:flex;align-items:center;gap:0.5rem;">💻
      <span class="hidden-mobile">Academia hachimaki</span></div>
    <div id="auth-nav" style="display:flex;align-items:center;gap:0.5rem;">
      <a href="../index.html" class="nav-auth-btn" style="padding:0.4rem 1rem;background:transparent;border:none;">🏠
        Home</a>
      <a href="dashboard.html" class="nav-auth-btn" style="padding:0.4rem 1rem;">Dashboard</a>
    </div>
  </nav>

  <div id="app" class="relative z-10" style="max-width:1100px;margin:0 auto;padding:6rem 1rem 6rem;">

    <!-- Loading global -->
    <div id="loading-screen" v-if="loading">
      <div class="auth-card">
        <div class="spinner"></div>
        <p class="auth-subtitle">Cargando competencias...</p>
      </div>
    </div>

    <template v-else>
      <!-- HEADER -->
      <div class="sd-card fade-in-up" style="margin-bottom: 1.5rem;">
        <div class="flex items-center gap-2 mb-2" v-if="currentView !== 'list'">
          <button @click="goToList" class="back-btn m-0"
            style="background:transparent;border:none;cursor:pointer;color:var(--t-accent);padding:0;">← Volver a
            competencias</button>
        </div>
        <h1 class="text-xl font-bold" style="color: var(--t-accent); display: flex; align-items: center; gap: 0.5rem;">
          {{ currentView === 'list' ? '🏆 Competencias' : '🏆 ' + viewComp.title }}
        </h1>
      </div>

      <!-- ==============================================
           VIEW: LISTADO DE COMPETENCIAS
           ============================================== -->
      <div v-if="currentView === 'list'" class="fade-in-up" style="max-width: 900px; margin: 0 auto;">
        <!-- Barra de búsqueda e invitación -->
        <div class="sd-card flex flex-col sm:flex-row gap-3 mb-6" style="padding: 1rem;">
          <div class="search-input-wrap flex-1" style="margin:0;">
            <span class="icon">🔍</span>
            <input type="text" class="search-input" placeholder="Buscar competencia..." v-model="searchQuery" />
          </div>
          <div class="search-input-wrap" style="margin:0; max-width: 250px;">
            <span class="icon">🎟️</span>
            <input type="text" class="search-input" placeholder="Código inv." v-model="inviteCodeInput"
              @keyup.enter="joinByCode" />
            <button class="sd-btn-accent"
              style="position:absolute;right:4px;top:4px;padding:0.4rem 0.8rem;border-radius:0.5rem;width:auto;font-size:0.8rem;"
              @click="joinByCode">Unirse</button>
          </div>
        </div>

        <!-- Filtros -->
        <div class="tag-filters mb-4">
          <button class="tag-pill" :class="{ active: filter === 'all' }" @click="filter = 'all'">✨ Todas</button>
          <button class="tag-pill" :class="{ active: filter === 'active' }" @click="filter = 'active'">🟢
            Activas</button>
          <button class="tag-pill" :class="{ active: filter === 'finished' }" @click="filter = 'finished'">✅
            Finalizadas</button>
          <button class="tag-pill" :class="{ active: filter === 'my' }" @click="filter = 'my'">👤 Mis
            Competencias</button>
        </div>

        <!-- Lista -->
        <div v-if="filteredComps.length" style="display:flex;flex-direction:column;gap:1rem;">
          <div v-for="(comp, idx) in filteredComps" :key="comp.id" class="sd-card fade-in-up"
            :style="{ animationDelay: (idx * 0.05) + 's' }">
            <div class="flex items-start justify-between gap-3">
              <div>
                <span class="comp-status" :class="comp.status">{{ statusLabel(comp.status) }}</span>
                <h3 class="text-lg font-bold mt-2" style="color:var(--t-accent);">{{ comp.title }}</h3>
                <p class="text-sm mt-1"
                  style="color:var(--t-text-secondary); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">
                  {{ comp.description }}</p>
                <div class="flex gap-3 mt-3 text-xs" style="color:var(--t-text-muted);">
                  <span>⏰ Cierra: {{ formatDate(comp.deadline) }}</span>
                  <span v-if="comp.created_by === profile.id">👑 Creada por ti</span>
                </div>
              </div>
            </div>
            <div class="flex gap-3 mt-4">
              <button v-if="comp.status === 'active' && !hasJoined(comp.id) && comp.created_by !== profile.id"
                class="sd-btn-accent" style="flex:1;padding:0.6rem;" @click="joinComp(comp)">¡Unirme! 🚀</button>
              <button class="sd-btn-sm" style="flex:1;padding:0.6rem;" @click="openComp(comp)">{{ hasJoined(comp.id) ||
                comp.created_by === profile.id ? 'Entrar al dojo 🥋' : 'Ver detalles 👁️' }}</button>
            </div>
          </div>
        </div>
        <div v-else class="sd-card">
          <div class="sd-empty">
            <div class="sd-empty-icon">🏆</div>
            <div class="sd-empty-text">No hay competencias disponibles.</div>
          </div>
        </div>

        <!-- FAB Crear -->
        <button class="diary-fab" @click="showCreateModal = true" title="Crear competencia">+</button>
      </div>


      <!-- ==============================================
           VIEW: DETALLE DE COMPETENCIA
           ============================================== -->
      <div v-else-if="currentView === 'detail' && viewComp" class="fade-in-up">

        <!-- SECTION: PROGRESS & HORIZONTAL INFO -->
        <div class="mb-6">
          <div class="sd-progress-card mb-3">
            <div class="sd-progress-info">
              <div class="sd-progress-title">Progreso del Desafío</div>
              <div class="sd-progress-value" style="font-size: 1.1rem;">{{ solvedCount }} / {{ compProblems.length }}
                <small style="font-size: 0.7em; opacity: 0.7;">EJERCICIOS</small></div>
            </div>
            <div class="sd-progress-bar-wrap">
              <div class="sd-progress-bar-fill" :style="{ width: overallProgress + '%' }"></div>
            </div>
            <div class="sd-progress-percent">{{ overallProgress }}%</div>
          </div>

          <!-- Horizontal Info Section -->
          <div class="sd-card flex flex-col md:flex-row gap-6 items-stretch mb-8" style="padding: 1.5rem;">
            <div style="flex: 2;">
              <h3 class="sd-sec" style="font-size: 0.75rem; opacity: 0.8; margin-bottom: 0.75rem;">📝 DESCRIPCIÓN</h3>
              <div class="text-sm" v-html="renderMd(viewComp.description)"
                style="line-height: 1.6; color: var(--t-text-secondary);"></div>
            </div>

            <div
              style="flex: 1; min-width: 200px; display: flex; flex-direction: column; justify-content: center; background: var(--t-surface-alt); border-radius: 1rem; padding: 1.25rem; border: 1px solid var(--t-glass-border); position: relative; overflow: hidden;">
              <!-- Subtle decorative element -->
              <div
                style="position: absolute; top: -10px; right: -10px; font-size: 3rem; opacity: 0.05; transform: rotate(15deg);">
                🔑</div>

              <h3 class="sd-sec" style="font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 1rem;">🔑 ACCESO</h3>
              <div class="flex flex-col gap-3">
                <div class="flex items-center justify-between">
                  <span class="text-xs font-bold" style="color: var(--t-text-muted);">Estado</span>
                  <span class="comp-status" :class="viewComp.status"
                    style="padding: 2px 8px; font-size: 9px; margin: 0;">{{ statusLabel(viewComp.status) }}</span>
                </div>
                <div v-if="viewComp.created_by === profile.id || hasJoined(viewComp.id)">
                  <p class="text-[10px] uppercase font-bold mb-1" style="color: var(--t-accent); opacity: 0.8;">Código
                    de Invitación</p>
                  <div class="invite-code-badge w-full text-center group cursor-pointer"
                    @click="copyCode(viewComp.invite_code)" title="Clic para copiar"
                    style="font-family: monospace; font-size: 1.1rem; letter-spacing: 2px; padding: 0.75rem; background: var(--t-surface); border: 1px dashed var(--t-accent); color: var(--t-text); transition: all 0.2s;">
                    {{ viewComp.invite_code }}
                    <span style="font-size: 0.8rem; margin-left: 0.5rem; opacity: 0.5;">📋</span>
                  </div>
                </div>
              </div>
            </div>

            <div style="flex: 2; padding-left: 0.5rem;" v-if="viewComp.rules">
              <h3 class="sd-sec"
                style="font-size: 0.75rem; color: var(--t-accent); opacity: 0.8; margin-bottom: 0.75rem;">⚖️ REGLAS DEL
                DOJO</h3>
              <div class="text-xs" style="color: var(--t-text-secondary); line-height: 1.5;"
                v-html="renderMd(viewComp.rules)"></div>
            </div>
          </div>
        </div>

        <!-- MAIN GRID: 2-COLUMN LAYOUT -->
        <div class="sd-master-detail-alt">

          <!-- LEFT: CONTENT CARD -->
          <div class="sd-col">
            <div class="sd-card" style="padding: 0; overflow: hidden;">
              <div class="sd-tabs-header">
                <button class="sd-tab-btn" :class="{ active: detailTab === 'problems' }"
                  @click="detailTab = 'problems'">📝 Problemas</button>
                <button class="sd-tab-btn" :class="{ active: detailTab === 'submissions' }"
                  @click="detailTab = 'submissions'">📂 Soluciones</button>
                <button class="sd-tab-btn" :class="{ active: detailTab === 'ranking' }"
                  @click="detailTab = 'ranking'">🏆 Ranking</button>
                <button class="sd-tab-btn" :class="{ active: detailTab === 'muro' }" @click="detailTab = 'muro'">💬 Muro
                  Social</button>
              </div>

              <div style="padding: 1.25rem;">

                <!-- TAB: PROBLEMAS -->
                <div v-if="detailTab === 'problems'">
                  <div v-if="compProblems.length === 0" class="text-center py-8 text-sm"
                    style="color:var(--t-text-muted);">
                    Esta competencia aún no tiene problemas.
                  </div>
                  <div v-else class="sd-master-detail">
                    <div class="sd-problem-nav">
                      <h4 class="sd-sec">📍 Mapa de Desafíos</h4>
                      <div class="sd-nav-grid">
                        <button v-for="p in compProblems" :key="p.id" class="sd-nav-item-btn"
                          :class="{ active: selectedProblemId === p.id, solved: isSolved(p.id) }"
                          @click="selectedProblemId = p.id">
                          {{ p.sort_order + 1 }}
                        </button>
                      </div>
                    </div>

                    <div class="sd-problem-detail" v-if="selectedProblem">
                      <div class="sd-problem-header">
                        <div>
                          <h2 class="sd-problem-title">Ejercicio {{ selectedProblem.sort_order + 1 }}: {{
                            selectedProblem.title }}</h2>
                          <span class="sd-pill mt-2" :class="selectedProblem.difficulty">{{
                            selectedProblem.difficulty.toUpperCase() }}</span>
                        </div>
                      </div>
                      <div class="mt-4" style="color: var(--t-text-secondary); line-height: 1.6; font-size: 0.95rem;"
                        v-html="renderMd(selectedProblem.description)"></div>

                      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
                        <div v-if="selectedProblem.example_input && selectedProblem.example_input !== 'N/A'"
                          class="sd-console-box">
                          <span class="sd-console-label">Input Esperado</span>
                          <pre class="sd-console-content">{{ selectedProblem.example_input }}</pre>
                          <button class="sd-console-copy"
                            @click="copyToClipboard(selectedProblem.example_input)">Copiar</button>
                        </div>
                        <div v-if="selectedProblem.example_output" class="sd-console-box">
                          <span class="sd-console-label">Output Esperado</span>
                          <pre class="sd-console-content">{{ selectedProblem.example_output }}</pre>
                          <button class="sd-console-copy"
                            @click="copyToClipboard(selectedProblem.example_output)">Copiar</button>
                        </div>
                      </div>

                      <div v-if="viewComp.status === 'active' && hasJoined(viewComp.id)" class="mt-8 pt-6 border-t"
                        style="border-color:var(--t-glass-border);">
                        <div v-if="getMySubmission(selectedProblem.id)" class="sd-card"
                          style="background:var(--t-accent-subtle); border-color:var(--t-accent); padding: 1rem;">
                          <div class="flex justify-between items-center">
                            <div>
                              <p class="font-bold text-sm" style="color:var(--t-accent);">✅ Solución entregada</p>
                              <p class="text-xs" style="color:var(--t-correct-text);">Archivo: {{
                                getMySubmission(selectedProblem.id).file_name }}</p>
                            </div>
                            <button class="sd-btn-accent" style="width:auto; padding: 0.5rem 1rem;"
                              @click="triggerUpload(selectedProblem.id)">Re-enviar 🔄</button>
                          </div>
                        </div>
                        <div v-else class="upload-zone" @click="triggerUpload(selectedProblem.id)">
                          <div class="text-3xl mb-2">🐍</div>
                          <p class="font-bold text-sm" style="color:var(--t-accent);">Subir solución (.py)</p>
                          <p class="text-xs mt-1" style="color: var(--t-text-muted);">Haz clic aquí para buscar tu
                            archivo.</p>
                        </div>
                        <input :id="'file-' + selectedProblem.id" type="file" accept=".py"
                          @change="handleFileSelect($event, selectedProblem.id)" style="display:none;" />
                      </div>
                    </div>
                  </div>
                </div>

                <!-- TAB: SOLUCIONES -->
                <div v-if="detailTab === 'submissions'">
                  <div v-if="viewComp.status === 'active' && !userIsCreator(viewComp)" class="text-center py-12">
                    <div class="text-5xl mb-4">🔒</div>
                    <h3 class="font-bold text-xl mb-2" style="color:var(--t-text);">Soluciones Protegidas</h3>
                    <p class="text-sm text-secondary px-8">Las soluciones se revelarán al finalizar la competencia.</p>
                  </div>
                  <div v-else>
                    <div v-if="compSubmissions.length === 0" class="sd-empty">
                      <div class="sd-empty-icon">📂</div>
                      <div class="sd-empty-text">Aún no hay soluciones enviadas.</div>
                    </div>
                    <template v-else>
                      <!-- Toggle: Por Ejercicio / Por Persona -->
                      <div class="flex items-center gap-2 mb-4">
                        <div class="sd-feed-tabs" style="flex:1;">
                          <button class="sd-tab" :class="{ active: subView === 'byExercise' }"
                            @click="subView = 'byExercise'">📝 Por Ejercicio</button>
                          <button class="sd-tab" :class="{ active: subView === 'byPerson' }"
                            @click="subView = 'byPerson'">👥 Por Persona</button>
                        </div>
                        <span class="text-xs" style="color:var(--t-text-muted);">{{ compSubmissions.length }}
                          soluciones</span>
                      </div>

                      <!-- Vista: Por Ejercicio -->
                      <div v-if="subView === 'byExercise'">
                        <div v-for="prob in compProblems" :key="'sub-'+prob.id" class="mb-4">
                          <div class="dojo-commit-row cursor-pointer"
                            @click="toggleSubGroup('ex-'+prob.id)" style="user-select:none;">
                            <span class="text-xs" style="color:var(--t-accent); min-width: 15px;">{{ expandedSubGroups['ex-'+prob.id] ?
                              '▼' : '▶' }}</span>
                            <span class="sd-sec m-0" style="color:var(--t-accent); font-size: 0.85rem; text-transform: none; letter-spacing: normal;">{{ prob.title }}</span>
                            <span class="dojo-commit-spacer"></span>
                            <span class="sd-pill"
                              style="background:var(--t-surface-alt);color:var(--t-text-muted);font-size:9px;">{{
                              getSubmissionsForProblem(prob.id).length }} soluciones</span>
                          </div>
                          <div v-if="expandedSubGroups['ex-'+prob.id]"
                            style="display:flex;flex-direction:column;gap:2px; padding-left: 1.5rem;">
                            <div v-for="sub in getSubmissionsForProblem(prob.id)" :key="sub.id" class="flex flex-col mb-1">
                              <div class="dojo-commit-row">
                                <div class="dojo-commit-avatar" @click="goToProfile(sub.user_id)">
                                  <img :src="getAvatar(sub.profiles)" />
                                </div>
                                <span class="dojo-commit-nick" @click="goToProfile(sub.user_id)">{{
                                  sub.profiles?.nickname
                                  }}</span>
                                <a v-if="sub.profiles?.github_username"
                                  :href="'https://github.com/'+sub.profiles.github_username" target="_blank"
                                  class="dojo-github-link" title="Ver GitHub">
                                  <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                                    <path
                                      d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
                                  </svg>
                                </a>
                                <span v-if="sub.profiles?.level" class="dojo-level-badge">Lv.{{ sub.profiles.level
                                  }}</span>
                                <span class="dojo-commit-spacer"></span>
                                <button class="dojo-file-pill" @click="downloadSolution(sub)">⬇ {{ sub.file_name
                                  }}</button>

                                <div class="flex items-center gap-1 ml-2 mr-1">
                                  <button class="sd-action" :class="{ liked: hasVoted(sub.id) === 1 }"
                                    @click.stop="castVote(sub.id, 1)" title="¡Me gusta!">
                                    👍 <small>{{ sub.likes_count || 0 }}</small>
                                  </button>
                                  <button class="sd-action" @click.stop="toggleComments(sub.id)"
                                    :class="{ active: expandedComments === sub.id }" title="Comentarios">
                                    💬 <small>{{ getSubComments(sub.id).length }}</small>
                                  </button>
                                </div>

                                <span class="dojo-commit-time">{{ timeAgo(sub.submitted_at) }}</span>
                              </div>

                              <!-- Comentarios Solución -->
                              <div v-if="expandedComments === sub.id" class="fade-in"
                                style="padding-left: 3rem; margin-top: 4px; margin-bottom: 12px; border-left: 2px solid var(--t-glass-border); margin-left: 14px;">
                                <div v-for="c in getSubComments(sub.id)" :key="c.id" class="sd-inline-comment mb-2">
                                  <div class="sd-av" style="width:24px;height:24px;"><img
                                      :src="getAvatar(c.profiles)" /></div>
                                  <div class="sd-comment-bubble" style="padding: 6px 12px;">
                                    <div class="sd-comment-author"
                                      style="font-size: 10px; font-weight: 800; color: var(--t-accent);">{{
                                      c.profiles?.nickname }}</div>
                                    <div class="sd-comment-text" style="font-size: 11px;">{{ c.content }}</div>
                                  </div>
                                </div>
                                <div class="sd-inline-comment mt-2">

  <script src="../js/supabase-client.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          loading: true,
          profile: null,
          currentView: 'list', // 'list' | 'detail'

          // Listado
          competitions: [],
          myParticipants: [], // [{competition_id}]
          searchQuery: '',
          filter: 'active',
          inviteCodeInput: '',

          // Detalle
          viewComp: null,
          detailTab: 'problems', // 'problems' | 'submissions' | 'ranking'
          selectedProblemId: null, // ID del problema seleccionado
          compProblems: [],
          compSubmissions: [],
          compVotes: [],
          myVotes: [], // mis votos en esta competencia
          dojoParticipants: [], // participantes con dojo_xp
          submissionComments: [],
          expandedComments: null,
          newSubComments: {},
          postingSubComment: null,

          // Soluciones View State
          subView: 'byExercise', // 'byExercise' | 'byPerson'
          expandedSubGroups: {}, // { 'ex-123': true, 'usr-456': false }

          // Muro Social (Local State Mock for now)
          muroPosts: [],
          newWallPost: '',
          activityFeed: [], // Feed de actividad reciente

          // Crear Modal
          showCreateModal: false,
          saving: false,
          createForm: this.getEmptyForm()
        };
      },
      computed: {
        filteredComps() {
          let list = this.competitions;
          if (this.filter === 'active') list = list.filter(c => c.status === 'active');
          if (this.filter === 'finished') list = list.filter(c => c.status === 'finished');
          if (this.filter === 'my') list = list.filter(c => c.created_by === this.profile.id || this.hasJoined(c.id));

          if (this.searchQuery.trim()) {
            const q = this.searchQuery.toLowerCase();
            list = list.filter(c => c.title.toLowerCase().includes(q) || (c.description || '').toLowerCase().includes(q));
          }
          return list;
        },
        leaderboard() {
          // Calcular score del dojo EXCLUSIVAMENTE con métricas internas
          const scores = {};
          if (!this.viewComp) return [];

          // 1. Contar submissions y likes por usuario (métricas internas del dojo)
          this.compSubmissions.forEach(sub => {
            if (!scores[sub.user_id]) {
              scores[sub.user_id] = {
                user_id: sub.user_id,
                nickname: sub.profiles?.nickname || 'Usuario',
                avatar_id: sub.profiles?.avatar_id || 'default',
                avatar_source: sub.profiles?.avatar_source,
                avatar_custom_url: sub.profiles?.avatar_custom_url,
                submissions: 0,
                likes: 0,
                wallPosts: 0,
                dojoXp: 0,
                dojoScore: 0
              };
            }
            scores[sub.user_id].submissions += 1;
            scores[sub.user_id].likes += Math.max(0, (sub.likes_count || 0) - (sub.dislikes_count || 0));
          });

          // 2. Contar wall posts por usuario
          (this.muroPosts || []).forEach(post => {
            if (scores[post.user_id]) {
              scores[post.user_id].wallPosts += 1;
            } else {
              scores[post.user_id] = {
                user_id: post.user_id,
                nickname: post.profiles?.nickname || 'Usuario',
                avatar_id: post.profiles?.avatar_id || 'default',
                avatar_source: post.profiles?.avatar_source,
                avatar_custom_url: post.profiles?.avatar_custom_url,
                submissions: 0, likes: 0, wallPosts: 1, dojoXp: 0, dojoScore: 0
              };
            }
          });

          // 3. Obtener dojo_xp de la tabla de participantes
          (this.dojoParticipants || []).forEach(p => {
            if (scores[p.user_id]) {
              scores[p.user_id].dojoXp = p.dojo_xp || 0;
            }
          });

          // 4. Calcular dojoScore compuesto:
          //    - Cada submission vale 100 pts
          //    - Cada like neto vale 50 pts
          //    - Cada wall post vale 10 pts
          //    - dojo_xp se suma directo
          Object.values(scores).forEach(s => {
            s.dojoScore = (s.submissions * 100) + (s.likes * 50) + (s.wallPosts * 10) + s.dojoXp;
          });

          return Object.values(scores).sort((a, b) => b.dojoScore - a.dojoScore);
        },
        uniqueParticipants() {
          const map = new Map();
          this.compSubmissions.forEach(sub => {
            if (!map.has(sub.user_id)) {
              map.set(sub.user_id, {
                id: sub.user_id,
                nickname: sub.profiles?.nickname || 'Usuario',
                avatar_id: sub.profiles?.avatar_id || 'default',
                avatar_source: sub.profiles?.avatar_source,
                avatar_custom_url: sub.profiles?.avatar_custom_url
              });
            }
          });
          return Array.from(map.values());
        },
        myRank() {
          if (!this.profile) return '-';
          const lb = this.leaderboard;
          const idx = lb.findIndex(u => u.user_id === this.profile.id);
          return idx >= 0 ? (idx === 0 ? '👑' : '#' + (idx + 1)) : '-';
        },
        solvedCount() {
          if (!this.profile || !this.compProblems.length) return 0;
          const mySubs = this.compSubmissions.filter(s => s.user_id === this.profile.id);
          const solvedIds = new Set(mySubs.map(s => s.problem_id));
          return solvedIds.size;
        },
        overallProgress() {
          if (!this.compProblems.length) return 0;
          return Math.round((this.solvedCount / this.compProblems.length) * 100);
        },
        selectedProblem() {
          if (!this.selectedProblemId) return this.compProblems[0];
          return this.compProblems.find(p => p.id === this.selectedProblemId) || this.compProblems[0];
        },
        submissionsByPerson() {
          const map = {};
          this.compSubmissions.forEach(sub => {
            const uid = sub.user_id;
            if (!map[uid]) {
              map[uid] = {
                user_id: uid,
                nickname: sub.profiles?.nickname || 'Usuario',
                avatar_id: sub.profiles?.avatar_id || 'default',
                avatar_source: sub.profiles?.avatar_source,
                avatar_custom_url: sub.profiles?.avatar_custom_url,
                github_username: sub.profiles?.github_username,
                level: sub.profiles?.level,
                subs: []
              };
            }
            map[uid].subs.push(sub);
          });
          return Object.values(map).sort((a, b) => b.subs.length - a.subs.length);
        }
      },
      async mounted() {
        const profile = await SupabaseManager.requireProfile('setup-profile.html');
        if (!profile) return;
        this.profile = profile;
        await this.loadList();
        this.loading = false;
      },
      methods: {
        getEmptyForm() {
          const dl = new Date();
          dl.setDate(dl.getDate() + 7);
          // format para datetime-local (YYYY-MM-DDThh:mm)
          const dlStr = new Date(dl.getTime() - (dl.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
          return {
            title: '', description: '', rules: '', deadline: dlStr,
            problems: [{ title: '', description: '', difficulty: 'medium', example_input: '', example_output: '' }]
          };
        },
        async loadList() {
          const client = SupabaseManager.getClient();
          const { data: comps } = await client.from('competitions').select('*').order('created_at', { ascending: false });
          this.competitions = comps || [];

          const { data: parts } = await client.from('competition_participants').select('competition_id').eq('user_id', this.profile.id);
          this.myParticipants = parts || [];
        },
        hasJoined(compId) {
          return this.myParticipants.some(p => p.competition_id === compId);
        },
        userIsCreator(comp) {
          return comp.created_by === this.profile.id;
        },
        statusLabel(status) {
          return { active: '🟢 Activa', finished: '🏁 Finalizada', cancelled: '❌ Cancelada' }[status] || status;
        },
        formatDate(dateStr) {
          if (!dateStr) return 'Sin límite';
          const d = new Date(dateStr);
          return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        },
        renderMd(text) {
          return text ? marked.parse(text) : '';
        },


        // Acciones Listado
        async joinComp(comp) {
          const client = SupabaseManager.getClient();
          const { error } = await client.from('competition_participants').insert({ competition_id: comp.id, user_id: this.profile.id });
          if (error) SupabaseManager.showToast('Error: ' + error.message, 'error');
          else {
            SupabaseManager.showToast('¡Te has unido al dojo! 🥋', 'success');
            await this.loadList();
            this.openComp(comp);
          }
        },
        async joinByCode() {
          const code = this.inviteCodeInput.trim();
          if (!code) return;
          const comp = this.competitions.find(c => c.invite_code === code);
          if (comp) {
            if (this.hasJoined(comp.id)) this.openComp(comp);
            else this.joinComp(comp);
            this.inviteCodeInput = '';
          } else {
            SupabaseManager.showToast('Código inválido o competencia no existe', 'error');
          }
        },

        // Acciones Detalle
        async openComp(comp) {
          this.loading = true;
          this.viewComp = comp;
          this.detailTab = 'problems';
          const client = SupabaseManager.getClient();

          // Cargar problemas
          const { data: probs } = await client.from('competition_problems').select('*').eq('competition_id', comp.id).order('sort_order', { ascending: true });
          this.compProblems = probs || [];

          // Cargar entregas (con joins manuales o automaticos)
          const { data: subs } = await client.from('competition_submissions').select('*, profiles(nickname, avatar_id, avatar_source, avatar_custom_url, github_username, level)').eq('competition_id', comp.id);
          this.compSubmissions = subs || [];

          // Cargar mis votos
          if (subs && subs.length) {
            const subIds = subs.map(s => s.id);
            const { data: votes } = await client.from('competition_votes').select('*').eq('user_id', this.profile.id).in('submission_id', subIds);
            this.myVotes = votes || [];

            // Cargar comentarios
            const { data: comments } = await client.from('submission_comments').select('*, profiles(nickname, avatar_id, avatar_source, avatar_custom_url)').in('submission_id', subIds).order('created_at', { ascending: true });
            this.submissionComments = comments || [];
          }

          // Cargar Muro Social
          const { data: posts } = await client.from('competition_wall_posts').select('*, profiles(nickname, avatar_id, avatar_source, avatar_custom_url)').eq('competition_id', comp.id).order('created_at', { ascending: false });
          this.muroPosts = posts || [];

          // Cargar participantes con dojo_xp
          const { data: dojoP } = await client.from('competition_participants').select('user_id, dojo_xp, profiles(nickname, avatar_id, avatar_source, avatar_custom_url, github_username, level)').eq('competition_id', comp.id);
          this.dojoParticipants = dojoP || [];

          // Construir feed de actividad REAL desde submissions y muro
          this.activityFeed = [];
          (this.compSubmissions || []).slice(0, 10).forEach(sub => {
            const probTitle = this.compProblems.find(p => p.id === sub.problem_id)?.title || 'un desafío';
            this.activityFeed.push({
              id: 'sub-' + sub.id,
              nickname: sub.profiles?.nickname || 'Usuario',
              action: `subió solución a "${probTitle}"`,
              time: this.timeAgo(sub.submitted_at)
            });
          });
          (this.muroPosts || []).slice(0, 5).forEach(post => {
            this.activityFeed.push({
              id: 'wall-' + post.id,
              nickname: post.profiles?.nickname || 'Usuario',
              action: 'publicó en el muro',
              time: this.timeAgo(post.created_at)
            });
          });
          // Ordenar por fecha
          this.activityFeed.sort((a, b) => {
            const tA = a.time || '';
            const tB = b.time || '';
            return tA.localeCompare(tB);
          });

          if (this.compProblems.length > 0) {
            this.selectedProblemId = this.compProblems[0].id;
          }

          this.currentView = 'detail';
          this.loading = false;
        },
        copyToClipboard(text) {
          navigator.clipboard.writeText(text);
          SupabaseManager.showToast('Copiado al portapapeles', 'info');
        },
        goToList() {
          this.currentView = 'list';
          this.viewComp = null;
        },
        isSolved(probId) {
          return !!this.getMySubmission(probId);
        },
        copyCode(code) {
          navigator.clipboard.writeText(code);
          SupabaseManager.showToast('Código copiado', 'info');
        },

        // Soluciones
        getMySubmission(probId) {
          return this.compSubmissions.find(s => s.problem_id === probId && s.user_id === this.profile.id);
        },
        getSubmissionsForProblem(probId) {
          return this.compSubmissions.filter(s => s.problem_id === probId).sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));
        },
        triggerUpload(probId) {
          document.getElementById('file-' + probId).click();
        },
        handleDrop(e, probId) {
          e.currentTarget.classList.remove('dragover');
          if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
            this.processFile(e.dataTransfer.files[0], probId);
          }
        },
        handleFileSelect(e, probId) {
          if (e.target.files && e.target.files.length > 0) {
            this.processFile(e.target.files[0], probId);
          }
          e.target.value = ''; // reset
        },
        async processFile(file, probId) {
          if (!file.name.endsWith('.py')) {
            SupabaseManager.showToast('Solo se permiten archivos .py', 'warning');
            return;
          }
          if (file.size > 50 * 1024) {
            SupabaseManager.showToast('El archivo debe pesar menos de 50KB', 'warning');
            return;
          }

          this.loading = true;
          // Upload a Storage
          const res = await SupabaseManager.uploadSolutionFile(file, this.viewComp.id, probId);
          if (res.error) {
            SupabaseManager.showToast('Error subiendo archivo: ' + res.error.message, 'error');
            this.loading = false;
            return;
          }

          // Registrar en DB (Upsert manual)
          const client = SupabaseManager.getClient();
          const existing = this.getMySubmission(probId);
          let dbRes;

          if (existing) {
            dbRes = await client.from('competition_submissions').update({
              file_path: res.data.path,
              file_name: file.name,
              attempt_count: existing.attempt_count + 1,
              updated_at: new Date().toISOString(),
              submitted_at: new Date().toISOString() // reseteamos el tiempo para ranking
            }).eq('id', existing.id).select('*, profiles(nickname, avatar_id)').single();
          } else {
            dbRes = await client.from('competition_submissions').insert({
              problem_id: probId,
              competition_id: this.viewComp.id,
              user_id: this.profile.id,
              file_path: res.data.path,
              file_name: file.name
            }).select('*, profiles(nickname, avatar_id)').single();
          }

          if (dbRes.error) {
            SupabaseManager.showToast('Error guardando en BD', 'error');
          } else {
            SupabaseManager.showToast('Solución enviada correctamente ✅', 'success');
            // Actualizar local
            if (existing) {
              const idx = this.compSubmissions.findIndex(s => s.id === existing.id);
              if (idx >= 0) this.compSubmissions[idx] = dbRes.data;
            } else {
              this.compSubmissions.push(dbRes.data);
            }
          }
          this.loading = false;
        },
        async downloadSolution(sub) {
          const res = await SupabaseManager.getSolutionDownloadUrl(sub.file_path, sub.file_name);
          if (res.error) {
            SupabaseManager.showToast('Error obteniendo link de descarga', 'error');
          } else {
            // Abrir link temporal
            window.open(res.data.signedUrl, '_blank');
          }
        },
        toggleSubGroup(id) {
          this.expandedSubGroups[id] = !this.expandedSubGroups[id];
        },
        getProblemTitle(probId) {
          const p = this.compProblems.find(x => x.id === probId);
          return p ? p.title : 'Desconocido';
        },
        timeAgo(dateStr) {
          if (!dateStr) return '';
          const seconds = Math.floor((new Date() - new Date(dateStr)) / 1000);
          let interval = seconds / 31536000;
          if (interval > 1) return 'hace ' + Math.floor(interval) + ' años';
          interval = seconds / 2592000;
          if (interval > 1) return 'hace ' + Math.floor(interval) + ' meses';
          interval = seconds / 86400;
          if (interval > 1) return 'hace ' + Math.floor(interval) + ' días';
          interval = seconds / 3600;
          if (interval > 1) return 'hace ' + Math.floor(interval) + ' h';
          interval = seconds / 60;
          if (interval > 1) return 'hace ' + Math.floor(interval) + ' min';
          return 'hace unos segundos';
        },
        goToProfile(userId) {
          window.location.href = `profile.html?id=${userId}`;
        },

        // Votos
        hasVoted(subId) {
          const vote = this.myVotes.find(v => v.submission_id === subId);
          return vote ? vote.vote : 0;
        },
        async castVote(subId, val) {
          const current = this.hasVoted(subId);
          const newVal = current === val ? 0 : val; // toggle

          // Optimistic UI update
          const sub = this.compSubmissions.find(s => s.id === subId);
          if (sub) {
            if (current === 1) sub.likes_count--;
            else if (current === -1) sub.dislikes_count--;

            if (newVal === 1) sub.likes_count++;
            else if (newVal === -1) sub.dislikes_count++;
          }

          const existingVoteIdx = this.myVotes.findIndex(v => v.submission_id === subId);
          if (newVal === 0) {
            if (existingVoteIdx >= 0) this.myVotes.splice(existingVoteIdx, 1);
          } else {
            if (existingVoteIdx >= 0) this.myVotes[existingVoteIdx].vote = newVal;
            else this.myVotes.push({ submission_id: subId, user_id: this.profile.id, vote: newVal });
          }

          const res = await SupabaseManager.voteOnSubmission(subId, newVal);
          if (res && res.error) {
            SupabaseManager.showToast('Error al registrar voto', 'error');
            // rever UI is complex here, reload
            this.openComp(this.viewComp);
          }
        },

        // Comments
        getSubComments(subId) {
          return this.submissionComments.filter(c => c.submission_id === subId);
        },
        toggleComments(subId) {
          this.expandedComments = this.expandedComments === subId ? null : subId;
        },
        getAvatar(profileOrId) {
          if (typeof profileOrId === 'object' && profileOrId !== null) {
            if (profileOrId.avatar_source === 'custom' && profileOrId.avatar_custom_url) {
              return profileOrId.avatar_custom_url;
            }
            profileOrId = profileOrId.avatar_id;
          }
          const catalog = SupabaseManager.getAvatarCatalog();
          const av = catalog.find(a => a.id === profileOrId);
          return av ? av.src : catalog[0].src;
        },
        async postSubComment(subId) {
          const content = (this.newSubComments[subId] || '').trim();
          if (!content) return;

          this.postingSubComment = subId;
          const client = SupabaseManager.getClient();

          const { data, error } = await client
            .from('submission_comments')
            .insert({
              submission_id: subId,
              user_id: this.profile.id,
              content: content
            })
            .select('*, profiles(nickname, avatar_id, avatar_source, avatar_custom_url)')
            .single();

          if (error) {
            SupabaseManager.showToast('Error publicando: ' + error.message, 'error');
          } else {
            this.submissionComments.push(data);
            this.newSubComments[subId] = '';
            SupabaseManager.showToast('Comentario publicado', 'success');
          }
          this.postingSubComment = null;
        },

        // Muro Social
        async postToWall() {
          const content = this.newWallPost.trim();
          if (!content) return;

          const res = await SupabaseManager.postToCompetitionWall(this.viewComp.id, content);
          if (res.error) {
            SupabaseManager.showToast('Error publicando: ' + res.error.message, 'error');
          } else {
            this.muroPosts.unshift(res.data);
            this.newWallPost = '';
            SupabaseManager.showToast('Publicación enviada 🚀', 'success');
          }
        },

        // Crear & Carga Masiva
        downloadJsonTemplate() {
          const dl = new Date();
          dl.setDate(dl.getDate() + 7);
          const dlStr = new Date(dl.getTime() - (dl.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);

          const template = {
            "_instruction_for_ai": "IMPORTANTE: Este es un archivo de configuración para una competencia de programación. Todas las claves que empiezan con '_' son comentarios y guías, no las modifiques ni las elimines. Rellena los valores reales.",
            "title": "Reto Algoritmos 1",
            "_comment_title": "El título de la competencia. Debe ser corto y claro.",
            "description": "El objetivo general de esta competencia es...",
            "_comment_description": "Puedes usar Markdown. Explica de qué trata la competencia en general.",
            "rules": "No usar librerías externas...",
            "_comment_rules": "Opcional. Reglas específicas para esta competencia. Soporta Markdown.",
            "deadline": dlStr,
            "_comment_deadline": "Fecha y hora límite en formato ISO (YYYY-MM-DDThh:mm).",
            "_comment_problems": "A continuación, la lista de problemas. Puedes añadir tantos como necesites siguiendo la misma estructura.",
            "problems": [
              {
                "title": "Detector de Capicúas",
                "difficulty": "medium",
                "_comment_difficulty": "Valores permitidos: 'easy', 'medium' o 'hard'.",
                "description": "Crea un programa en Python que determine si un número es capicúa. Debe imprimir 'Es capicúa' o 'No es capicúa'.",
                "_comment_description": "El enunciado del problema. Soporta Markdown.",
                "example_input": "121",
                "example_output": "Es capicúa"
              }
            ]
          };

          const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(template, null, 2));
          const el = document.createElement('a');
          el.setAttribute("href", dataStr);
          el.setAttribute("download", "plantilla_competencia.json");
          document.body.appendChild(el);
          el.click();
          el.remove();
        },
        triggerJsonUpload() {
          document.getElementById('json-upload').click();
        },
        handleJsonUpload(e) {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const data = JSON.parse(ev.target.result);

              if (data.title) this.createForm.title = data.title;
              if (data.description) this.createForm.description = data.description;
              if (data.rules !== undefined) this.createForm.rules = data.rules;
              if (data.deadline) this.createForm.deadline = data.deadline;

              if (data.problems && Array.isArray(data.problems)) {
                // Limpiar guías y rellenar defaults
                this.createForm.problems = data.problems.map(p => ({
                  title: p.title || '',
                  difficulty: p.difficulty || 'medium',
                  description: p.description || '',
                  example_input: p.example_input || '',
                  example_output: p.example_output || ''
                }));
              }
              SupabaseManager.showToast('JSON cargado exitosamente', 'success');
            } catch (err) {
              SupabaseManager.showToast('Error: El archivo JSON tiene formato inválido', 'error');
              console.error("JSON Parse Error:", err);
            }
            e.target.value = ''; // reset file input
          };
          reader.readAsText(file);
        },
        addProblemFields() {
          this.createForm.problems.push({ title: '', description: '', difficulty: 'medium', example_input: '', example_output: '' });
        },
        removeProblemFields(idx) {
          this.createForm.problems.splice(idx, 1);
        },
        async submitCompetition() {
          if (!this.createForm.title.trim()) return SupabaseManager.showToast('El título es requerido', 'warning');
          const validProbs = this.createForm.problems.filter(p => p.title.trim() && p.description.trim());
          if (validProbs.length === 0) return SupabaseManager.showToast('Añade al menos 1 problema completo', 'warning');

          this.saving = true;
          const client = SupabaseManager.getClient();

          // 1. Insert Comp
          const { data: compData, error: compErr } = await client.from('competitions').insert({
            title: this.createForm.title.trim(),
            description: this.createForm.description.trim(),
            rules: this.createForm.rules.trim(),
            deadline: new Date(this.createForm.deadline).toISOString(),
            created_by: this.profile.id
          }).select().single();

          if (compErr) {
            this.saving = false;
            return SupabaseManager.showToast('Error creando comp: ' + compErr.message, 'error');
          }

          // 2. Insert Problems
          const probsToInsert = validProbs.map((p, i) => ({
            ...p,
            competition_id: compData.id,
            sort_order: i
          }));
          const { error: probErr } = await client.from('competition_problems').insert(probsToInsert);

          // 3. Auto-join creator
          await client.from('competition_participants').insert({ competition_id: compData.id, user_id: this.profile.id });

          this.saving = false;
          if (probErr) {
            SupabaseManager.showToast('Error insertando problemas', 'warning');
          } else {
            SupabaseManager.showToast('¡Competencia creada exitosamente!', 'success');
            this.showCreateModal = false;
            this.createForm = this.getEmptyForm();
            await this.loadList();
            this.openComp(compData);
          }
        }
      },
    }).mount('#app');
  </script>
</body>

</html>
